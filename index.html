<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Synergy Table</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f5f6f8;
    }

    h2 {
      margin-bottom: 8px;
    }

    button {
      padding: 8px 12px;
      margin-bottom: 10px;
      cursor: pointer;
      border: 1px solid #ccc;
      background: white;
      border-radius: 6px;
    }

    .share {
      font-size: 13px;
      margin-bottom: 12px;
      color: #444;
      word-break: break-all;
    }

    .sheet {
      border-collapse: collapse;
      width: 100%;
      max-width: 1100px;
      background: white;
      border: 1px solid #ddd;
    }

    .sheet th {
      position: sticky;
      top: 0;
      background: #e9ecef;
      text-align: left;
      padding: 10px;
      border: 1px solid #ddd;
    }

    .sheet td {
      border: 1px solid #ddd;
      padding: 8px;
      height: 42px;
    }

    .sheet td:first-child {
      min-width: 240px;
    }

    .sheet td:nth-child(4) {
      min-width: 260px;
    }

    .dropdown {
      position: relative;
      width: 100%;
    }

    .dropdown-input {
      width: 100%;
      padding: 6px;
      border: none;
      outline: none;
      background: transparent;
      font-size: 14px;
    }

    .dropdown-list {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: white;
      border: 1px solid #ddd;
      max-height: 200px;
      overflow-y: auto;
      display: none;
      z-index: 100;
    }

    .dropdown-item {
      padding: 6px;
      cursor: pointer;
    }

    .dropdown-item:hover {
      background: #f1f7ff;
    }
  </style>
</head>

<body>

<h2>VV Charm Compendium</h2>

<h3>A charm setup builder for ease of use.</h3>

<p><b>IMPORTANT:</b> The sync button is only for if you need your charm list updated after an update to the list. Other than that, it does nothing.</p>
<button onclick="syncNow()">🔄 Sync Now</button>

<div class="share" id="shareLink"></div>

<table class="sheet">
  <thead>
    <tr>
      <th>Charms</th>
      <th>Effects</th>
      <th>Tier</th>
      <th>Effectiveness</th>
    </tr>
  </thead>

  <tbody>
    <tr>
      <td>
        <div class="dropdown">
          <input id="c1" class="dropdown-input" placeholder="Search charm...">
          <div id="c1-list" class="dropdown-list"></div>
        </div>
      </td>
      <td id="b1"></td>
      <td id="d1"></td>
      <td id="e1"></td>
    </tr>

    <tr>
      <td>
        <div class="dropdown">
          <input id="c2" class="dropdown-input" placeholder="Search charm...">
          <div id="c2-list" class="dropdown-list"></div>
        </div>
      </td>
      <td id="b2"></td>
      <td id="d2"></td>
      <td id="e2"></td>
    </tr>

    <tr>
      <td>
        <div class="dropdown">
          <input id="c3" class="dropdown-input" placeholder="Search charm...">
          <div id="c3-list" class="dropdown-list"></div>
        </div>
      </td>
      <td id="b3"></td>
      <td id="d3"></td>
      <td id="e3"></td>
    </tr>
  </tbody>
</table>

<script>

const API = "https://script.google.com/macros/s/AKfycbzrl6Hnsqy3yRQPOHbU66PFxEGxb65Y7o7Z2Zg7xLbCySCJzPVFRr5-1RffbMcQtsNL/exec";

let charmList = [];

/* =========================
   CACHE
========================= */
function setCache(data) {
  localStorage.setItem("charmList", JSON.stringify(data));
}

function getCache() {
  const raw = localStorage.getItem("charmList");
  return raw ? JSON.parse(raw) : null;
}

/* =========================
   SAVE STATE
========================= */
function saveState() {
  const state = {
    c1: c1.value,
    c2: c2.value,
    c3: c3.value
  };

  localStorage.setItem("synergyState", JSON.stringify(state));
  updateShareLink(state);
}

/* =========================
   SHARE LINKS
========================= */
function updateShareLink(state) {
  const url = new URL(window.location.href);

  if (state.c1) url.searchParams.set("c1", state.c1);
  if (state.c2) url.searchParams.set("c2", state.c2);
  if (state.c3) url.searchParams.set("c3", state.c3);

  document.getElementById("shareLink").innerHTML =
    `Shareable link: <a href="${url.toString()}">${url.toString()}</a>`;
}

/* =========================
   RESTORE STATE
========================= */
function restoreState() {
  const params = new URLSearchParams(window.location.search);

  const state = {
    c1: params.get("c1") || "",
    c2: params.get("c2") || "",
    c3: params.get("c3") || ""
  };

  if (!state.c1 && !state.c2 && !state.c3) {
    const saved = localStorage.getItem("synergyState");
    if (saved) Object.assign(state, JSON.parse(saved));
  }

  if (state.c1) { c1.value = state.c1; fillRow(state.c1, 1); }
  if (state.c2) { c2.value = state.c2; fillRow(state.c2, 2); }
  if (state.c3) { c3.value = state.c3; fillRow(state.c3, 3); }

  updateShareLink(state);
}

/* =========================
   DATA FETCH
========================= */
function fillRow(charm, row) {
  fetch(`${API}?action=charmData&charm=${encodeURIComponent(charm)}`)
    .then(r => r.json())
    .then(data => {
      if (!data) return;

      document.getElementById("b" + row).textContent = data.charms;
      document.getElementById("d" + row).textContent = data.tier;
      document.getElementById("e" + row).textContent = data.effectiveness;
    });
}

/* =========================
   SEARCH
========================= */
function matchesCharm(charm, query) {
  const tokens = query.toLowerCase().trim().split(/\s+/);
  return tokens.every(t => charm.toLowerCase().includes(t));
}

/* =========================
   DROPDOWN
========================= */
function setupDropdown(input, listId, row) {
  const list = document.getElementById(listId);

  function render(filter) {
    list.innerHTML = "";

    charmList
      .filter(c => matchesCharm(c, filter))
      .forEach(charm => {
        const div = document.createElement("div");
        div.className = "dropdown-item";
        div.textContent = charm;

        div.onclick = () => {
          input.value = charm;
          list.style.display = "none";

          fillRow(charm, row);
          saveState();
        };

        list.appendChild(div);
      });

    list.style.display = list.children.length ? "block" : "none";
  }

  input.addEventListener("input", () => render(input.value));
  input.addEventListener("focus", () => render(input.value));

  document.addEventListener("click", e => {
    if (!e.target.closest(".dropdown")) list.style.display = "none";
  });
}

/* =========================
   SYNC BUTTON (FORCE REFRESH)
========================= */
function syncNow() {
  fetch(`${API}?action=charms`)
    .then(r => r.json())
    .then(data => {
      charmList = data;
      setCache(data);

      alert("Synced with latest charms!");
    });
}

/* =========================
   INIT
========================= */
const c1 = document.getElementById("c1");
const c2 = document.getElementById("c2");
const c3 = document.getElementById("c3");

function init(data) {
  charmList = data;

  setupDropdown(c1, "c1-list", 1);
  setupDropdown(c2, "c2-list", 2);
  setupDropdown(c3, "c3-list", 3);

  restoreState();
}

/* LOAD (CACHE FIRST) */
const cached = getCache();

if (cached) {
  init(cached);
} else {
  fetch(`${API}?action=charms`)
    .then(r => r.json())
    .then(data => {
      setCache(data);
      init(data);
    });
}

</script>

</body>
</html>
